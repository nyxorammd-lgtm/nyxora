name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.25'
          cache: true
      - name: Build
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
          go build -ldflags="-s -w" -o nyxora_${{ matrix.os }}_${{ matrix.arch }} ./cmd/nyxora
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          files: nyxora_${{ matrix.os }}_${{ matrix.arch }}
          generate_release_notes: true

  checksums:
    name: Checksums
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${{ github.ref_name }}" --dir ./checksums_input
      - name: Generate SHA256 checksums
        run: |
          cd checksums_input
          sha256sum * > ../checksums.txt
          cat ../checksums.txt
      - name: Upload checksums
        uses: softprops/action-gh-release@v3
        with:
          files: checksums.txt
