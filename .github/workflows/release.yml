name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Build
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
          go build -ldflags="-s -w" -o nyxora_${{ matrix.os }}_${{ matrix.arch }} ./cmd/nyxora
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          files: nyxora_${{ matrix.os }}_${{ matrix.arch }}
          generate_release_notes: true
