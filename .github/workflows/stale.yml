name: Stale Bot

on:
  schedule:
    - cron: '0 8 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: 'This issue has been inactive for 60 days. Will be closed in 14 days.'
          stale-pr-message: 'This PR has been inactive for 60 days. Will be closed in 14 days.'
          days-before-stale: 60
          days-before-close: 14
          exempt-issue-labels: 'pinned,security,enhancement'
          exempt-pr-labels: 'pinned,security'
